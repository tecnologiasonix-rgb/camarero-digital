<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ================= ROOT ================= */
    :root {
      --bg: #F4F2EE;
      --surface: #FFFFFF;
      --surface2: #F9F8F6;
      --border: #E5E2DC;
      --ink: #1A1A18;
      --ink-muted: #7A7870;
      --ink-dim: #BEBAB2;
      --accent: #1A1A18;
      --accent-fg: #FFFFFF;
      --danger: #D94F3D;
      --success: #2D9B6F;
      --radius: 12px;
      --shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Mulish', sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      height: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 36px; height: 36px;
      background: var(--ink);
      color: white;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-weight: 700; }
    .header-subtitle { font-size: 0.75rem; color: var(--ink-muted); }

    .btn-manage {
      background: var(--ink);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    #adminPanel { display: none; padding: 20px; }
    #adminPanel.open { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    th {
      background: var(--surface2);
      text-align: left; padding: 10px;
      font-size: 0.75rem; color: var(--ink-muted);
    }
    td { padding: 10px; border-top: 1px solid var(--border); }
    tr:hover { background: var(--surface2); }

    .loader-wrap {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      justify-content: center; align-items: center; flex-direction: column;
    }
    .loader-wrap.active { display: flex; }
    .loader-ring {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--ink);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--ink); color: white;
      padding: 10px 20px; border-radius: 20px;
      opacity: 0; transition: 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }

    #adminTableContainer p {
      padding: 20px; text-align: center; color: var(--ink-muted);
    }

    /* ================= LOGIN MODAL ================= */
    .login-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; justify-content: center; align-items: center;
      z-index: 9999; padding: 20px;
      backdrop-filter: blur(8px);
    }
    .login-content {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem 2rem;
      border-radius: var(--radius);
      text-align: center;
      max-width: 320px; width: 100%;
      box-shadow: var(--shadow);
      animation: modalPop 0.3s ease;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.9) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .login-logo {
      width: 52px; height: 52px;
      background: var(--ink); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: var(--accent-fg);
      margin: 0 auto 1.4rem;
    }
    .login-content h2 {
      font-size: 1.15rem; font-weight: 700; margin-bottom: 0.3rem;
    }
    .login-content p {
      font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 1.5rem;
    }
    .login-content input {
      width: 100%; padding: 11px 14px; margin-bottom: 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'Mulish', sans-serif; font-size: 1rem;
      background: var(--surface2); color: var(--ink);
      text-align: center; outline: none;
    }
    .login-content input:focus { border-color: var(--ink); }
    .login-content button {
      width: 100%; padding: 11px;
      font-family: 'Mulish', sans-serif; font-size: 0.9rem; font-weight: 700;
      background: var(--ink); color: var(--accent-fg);
      border: none; border-radius: 8px; cursor: pointer;
    }
    .login-error {
      color: var(--danger); margin-top: 12px; font-size: 0.82rem; display: none;
    }
  </style>
</head>
<body>

  <!-- MODAL DE LOGIN -->
  <div id="loginModal" class="login-modal">
    <div class="login-content">
      <div class="login-logo"><i class="fas fa-utensils"></i></div>
      <h2>Panel Admin</h2>
      <p>Accede con tus credenciales de restaurante</p>
      <input type="email" id="adminEmail" placeholder="📧 Email" autocomplete="username">
      <input type="password" id="adminPassword" placeholder="🔒 Contraseña" autocomplete="current-password">
      <button id="adminLoginBtn">Entrar</button>
      <p id="loginErrorMsg" class="login-error">
        <i class="fas fa-exclamation-triangle"></i> <span id="loginErrorText">Credenciales incorrectas</span>
      </p>
    </div>
  </div>

  <!-- LOADER -->
  <div class="loader-wrap" id="loader">
    <div class="loader-ring"></div>
    <p>Cargando…</p>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="header-icon"><i class="fas fa-utensils"></i></div>
      <div>
        <div class="header-title">Panel Admin</div>
        <div class="header-subtitle">Restaurante</div>
      </div>
    </div>
    <button id="toggleAdmin" class="btn-manage">
      <i class="fas fa-sliders-h"></i> Gestionar
    </button>
  </header>

  <!-- PANEL -->
  <div id="adminPanel">
    <div id="adminTableContainer"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDPbN_dr1LzVhksnFmzeKOLpHAZZRSxWv4",
      authDomain: "tecnologiasonix-733fc.firebaseapp.com",
      databaseURL: "https://tecnologiasonix-733fc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tecnologiasonix-733fc",
      storageBucket: "tecnologiasonix-733fc.firebasestorage.app",
      messagingSenderId: "139377195491",
      appId: "1:139377195491:web:0727f6e57cc23351bd88d6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let products = [];
    let restaurantId = null;

    const loginModal = document.getElementById("loginModal");
    const loginBtn = document.getElementById("adminLoginBtn");
    const emailInput = document.getElementById("adminEmail");
    const passInput = document.getElementById("adminPassword");
    const loginError = document.getElementById("loginErrorMsg");
    const loginErrorText = document.getElementById("loginErrorText");
    const toggleAdminBtn = document.getElementById("toggleAdmin");
    const adminPanel = document.getElementById("adminPanel");
    const container = document.getElementById("adminTableContainer");
    const toast = document.getElementById("toast");
    const loader = document.getElementById("loader");

    function getParam(param) {
      return new URLSearchParams(window.location.search).get(param);
    }

    adminPanel.style.display = "none";

    onAuthStateChanged(auth, async (user) => {
      const urlRestaurant = getParam("restaurante");
      if (urlRestaurant) {
        restaurantId = urlRestaurant;
        loginModal.style.display = "none";
        loadProducts();
        return;
      }

      if (user) {
        loginModal.style.display = "none";
        const snap = await get(ref(db, `usuarios/${user.uid}/restaurantId`));
        if (snap.exists()) {
          restaurantId = snap.val();
          loadProducts();
        } else {
          showToast("Tu cuenta no tiene restaurante asignado.", "error");
          await signOut(auth);
          loginModal.style.display = "flex";
        }
      } else {
        loginModal.style.display = "flex";
        restaurantId = null;
      }
    });

    loginBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passInput.value;
      loginError.style.display = "none";

      if (!email || !password) {
        loginErrorText.textContent = "Introduce email y contraseña.";
        loginError.style.display = "block";
        return;
      }
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        console.error(e);
        loginErrorText.textContent = "Credenciales incorrectas o error de red.";
        loginError.style.display = "block";
      }
    });

    [emailInput, passInput].forEach(el => {
      el.addEventListener("keyup", (e) => {
        if (e.key === "Enter") loginBtn.click();
      });
    });

    // Botón Salir
    const logoutBtn = document.createElement("button");
    logoutBtn.className = "btn-manage";
    logoutBtn.style.marginLeft = "10px";
    logoutBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Salir';
    logoutBtn.addEventListener("click", () => signOut(auth));
    document.querySelector("header").appendChild(logoutBtn);

    toggleAdminBtn.addEventListener("click", () => {
      adminPanel.classList.toggle("open");
      if (adminPanel.classList.contains("open")) {
        loadProducts();
      }
    });

    async function loadProducts() {
      if (!restaurantId) return;
      showLoader();
      const snap = await get(ref(db, `restaurantes/${restaurantId}/productos`));
      products = [];
      if (snap.exists()) {
        snap.forEach(child => products.push({ id: child.key, ...child.val() }));
      }
      renderProducts();
      hideLoader();
    }

    function renderProducts() {
      if (!products.length) {
        container.innerHTML = "<p>No hay productos en la base de datos.</p>";
        return;
      }
      container.innerHTML = `
        <table>
          <tr><th>Nombre</th><th>Precio</th></tr>
          ${products.map(p => `
            <tr>
              <td>${p.name || "Sin nombre"}</td>
              <td>${p.price ? p.price.toFixed(2) : '0.00'}€</td>
            </tr>
          `).join("")}
        </table>`;
    }

    function showLoader() { loader.classList.add("active"); }
    function hideLoader() { loader.classList.remove("active"); }
    function showToast(msg, type = "") {
      toast.textContent = msg;
      toast.className = "toast show " + type;
      setTimeout(() => toast.classList.remove("show"), 3000);
    }
  </script>

</body>
</html>
